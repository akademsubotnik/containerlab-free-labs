name: netconf-restconf-basics
#NETCONF and RESTCONF use yml to 
topology:
  nodes:
    r1:
      kind: linux
      image: frr-ssh:latest
      binds:
        - configs/r1/daemons:/etc/frr/daemons
        - configs/r1/frr.conf:/etc/frr/frr.conf
      ports:
        - 2221:22  # SSH access
      labels:
        lab-name: "netrestconf Basics"
        router-name: "R1"
      
    r2:
      kind: cisco_csr1000v
      image: edwin71/cisco-csr1000v:17.03.08
      binds:
      #  - configs/r2/r2-config.txt:/etc/frr/daemons
        - configs/r2/frr.conf:/etc/frr/frr.conf
      ports:
        #- 2222:22  # SSH access
        - 443:443/tcp   # Exposes HTTPS/RESTCONF
        - 80:80/tcp     # Exposes HTTP
      startup-config: configs/r2/r2-config.txt #Maps your config file
      labels:
        lab-name: "netrestconf Basics"
        router-name: "R2"

    pc1:
      kind: linux
      image: ubuntu:latest
      #binds:
      #  - configs/pc1/pc1config.conf:/etc/pc1config/pc1config.conf
      #ports: 
      #  - 2221:22 # SSH access
      #labels:
      #  lab-name: netconf-restconf-basics

  links:
    - endpoints: ["r1:eth1", "pc1:eth1"]  # 10.0.1.0/24